name: npm audit fix

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply audit fix (force)
        run: npm audit fix --force

      - name: Build and test
        run: npm run prepublish

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): apply npm audit fix"
          branch: "chore/npm-audit-fix"
          delete-branch: true
          title: "chore(deps): apply npm audit fix"
          body: |
            This PR was automatically generated by a manual GitHub Actions run.

            Changes:
            - Ran `npm audit fix`
            - Rebuilt generated artifacts
            - Ran test suite via `npm run prepublish`

            Please review dependency and lockfile changes carefully.
          labels: dependencies, automated pr
