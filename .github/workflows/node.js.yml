# This workflow installs dependencies, builds generated grammar artifacts, verifies
# the repository stays clean after generation, and runs tests.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js 22.x
      uses: actions/setup-node@v1
      with:
        node-version: '22.x'
    - run: npm ci # This will automatically build and run tests because it runs `npm run prepublish`
    - name: Verify generated files are committed
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::Repository is dirty after 'npm run build'. Run 'npm run build' and commit the generated changes."
          git --no-pager status --short
          exit 1
        fi
